<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MSR Sync Manager icon">
  <title>MSR Sync Manager</title>
  <defs>
    <!-- 主背景：品牌蓝 → 紫（与 GUI primary/accent 色一致） -->
    <linearGradient id="msr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2563EB"/>
      <stop offset="55%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- 顶部高光 -->
    <linearGradient id="msr-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- 循环箭头内部微高光 -->
    <linearGradient id="msr-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <!-- 柔和阴影 -->
    <filter id="msr-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角方形背景（iOS/macOS app icon 风格） -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#msr-bg)"/>
  <!-- 顶部高光 -->
  <rect width="512" height="256" rx="112" ry="112" fill="url(#msr-sheen)"/>

  <!-- 三个节点：代表多 IDE 的配置来源 / 同步目标 -->
  <g fill="#FFFFFF" opacity="0.85">
    <circle cx="256" cy="96"  r="14"/>
    <circle cx="96"  cy="384" r="14"/>
    <circle cx="416" cy="384" r="14"/>
  </g>
  <!-- 节点与中心环的虚线引线 -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-dasharray="4 6" opacity="0.45" fill="none">
    <line x1="256" y1="108" x2="256" y2="148"/>
    <line x1="108" y1="374" x2="158" y2="338"/>
    <line x1="404" y1="374" x2="354" y2="338"/>
  </g>

  <!-- 中心：双向循环同步箭头 -->
  <g filter="url(#msr-shadow)">
    <!-- 上弧（顺时针方向） -->
    <path d="M 160 232
             A 96 96 0 0 1 336 204"
          fill="none" stroke="url(#msr-ring)" stroke-width="38" stroke-linecap="round"/>
    <!-- 上弧箭头尖（指向右上/顺时针方向） -->
    <path d="M 352 176
             L 372 236
             L 312 232
             Z"
          fill="url(#msr-ring)"/>

    <!-- 下弧（顺时针方向继续） -->
    <path d="M 352 280
             A 96 96 0 0 1 176 308"
          fill="none" stroke="url(#msr-ring)" stroke-width="38" stroke-linecap="round"/>
    <!-- 下弧箭头尖（指向左下/顺时针方向） -->
    <path d="M 160 336
             L 140 276
             L 200 280
             Z"
          fill="url(#msr-ring)"/>
  </g>

  <!-- 中心标记 M（淡印，体现 MSR 品牌） -->
  <text x="256" y="282"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
        font-size="76"
        font-weight="800"
        fill="#FFFFFF"
        opacity="0.95">M</text>
</svg>
